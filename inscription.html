<script>
    function choisirType(type) {
      document.getElementById('type-parent').classList.remove('actif');
      document.getElementById('type-prof').classList.remove('actif');
      document.getElementById('type-' + type).classList.add('actif');
      if (type === 'prof') {
        document.getElementById('champs-prof').style.display = 'block';
      } else {
        document.getElementById('champs-prof').style.display = 'none';
      }
    }

    function afficherFichier(input) {
      if (input.files && input.files[0]) {
        document.getElementById('upload-nom').textContent = '✓ ' + input.files[0].name;
        document.getElementById('upload-nom').style.color = '#3B6D11';
      }
    }

    function afficherPhoto(input) {
      if (input.files && input.files[0]) {
        document.getElementById('upload-photo-nom').textContent = '✓ ' + input.files[0].name;
        document.getElementById('upload-photo-nom').style.color = '#3B6D11';
      }
    }

    document.querySelector('.btn-soumettre').addEventListener('click', async function() {
      const prenom = document.getElementById('prenom').value;
      const nom = document.getElementById('nom').value;
      const email = document.getElementById('email').value;
      const telephone = document.getElementById('telephone').value;
      const mot_de_passe = document.getElementById('mot_de_passe').value;
      const confirmer = document.getElementById('confirmer_mot_de_passe').value;
      const region = document.getElementById('region').value;
      const type = document.getElementById('type-prof').classList.contains('actif') ? 'prof' : 'parent';

      if (!prenom || !nom || !email || !mot_de_passe) {
        alert('Veuillez remplir tous les champs obligatoires.');
        return;
      }

      if (mot_de_passe !== confirmer) {
        alert('Les mots de passe ne correspondent pas.');
        return;
      }

      const donnees = { prenom, nom, email, telephone, mot_de_passe, type, region };

      if (type === 'prof') {
        donnees.matiere = document.getElementById('matiere').value;
        donnees.niveau = document.getElementById('niveau').value;
        donnees.tarif = document.getElementById('tarif').value;
        donnees.experience = document.getElementById('experience').value;
        donnees.bio = document.getElementById('bio').value;
      }

      try {
        // Créer le compte
        const reponse = await fetch('/api/inscription', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(donnees)
        });

        const data = await reponse.json();

        if (!reponse.ok) {
          alert(data.erreur);
          return;
        }

        // Si prof, uploader le document
        if (type === 'prof') {
          const fichierDoc = document.getElementById('fichier-doc').files[0];
          if (fichierDoc) {
            const formData = new FormData();
            formData.append('document', fichierDoc);
            formData.append('utilisateur_id', data.utilisateur_id);

            await fetch('/api/upload-document', {
              method: 'POST',
              body: formData
            });
          }
        }

        alert('Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
        window.location = 'connexion.html';

      } catch (erreur) {
        alert('Erreur de connexion au serveur.');
      }

    });
  </script>
