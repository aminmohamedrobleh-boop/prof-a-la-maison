<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace Prof - Prof à la Maison</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="logo">Prof<span>àlaMaison</span></div>
    <div class="nav-liens">
      <a href="index.html">Accueil</a>
      <span id="nav-prenom" style="font-size:14px; color:#534AB7; font-weight:500;"></span>
      <a href="parametres-prof.html" class="btn-connexion">⚙️ Paramètres</a>
      <a href="#" onclick="seDeconnecter()" class="btn-connexion">Déconnexion</a>
    </div>
  </nav>

  <!-- CONTENU -->
  <div class="dashboard-container">

    <!-- BIENVENUE -->
    <div class="dashboard-header">
      <div>
        <h1 id="bienvenue">Bonjour !</h1>
        <p style="color:#777; font-size:14px;">Espace professeur</p>
      </div>
      <div class="badge vert" id="statut-badge">✓ Compte vérifié</div>
    </div>

    <!-- STATS -->
    <div class="stats-grille">
      <div class="stat-carte">
        <div class="stat-num" id="total-demandes">0</div>
        <div class="stat-label">Demandes reçues</div>
      </div>
      <div class="stat-carte">
        <div class="stat-num" id="demandes-attente">0</div>
        <div class="stat-label">En attente</div>
      </div>
      <div class="stat-carte">
        <div class="stat-num" id="demandes-confirmees">0</div>
        <div class="stat-label">Confirmées</div>
      </div>
    </div>

    <!-- DEMANDES DE RÉSERVATION -->
    <div class="dashboard-section">
      <h2>Demandes de réservation</h2>

      <div class="vide-container" id="aucune-demande" style="display:none;">
        <div class="vide-icone">📭</div>
        <h3>Aucune demande pour l'instant</h3>
        <p>Les parents pourront vous contacter une fois votre profil visible.</p>
      </div>

      <div id="liste-demandes"></div>

    </div>

  </div>

  <script>
    const utilisateur = JSON.parse(localStorage.getItem('utilisateur'));
    const token = localStorage.getItem('token');

    if (!utilisateur || !token) {
      alert('Veuillez vous connecter.');
      window.location = 'connexion.html';
    }

    document.getElementById('bienvenue').textContent = 'Bonjour ' + utilisateur.prenom + ' !';
    document.getElementById('nav-prenom').textContent = utilisateur.prenom + ' ' + utilisateur.nom;

    async function chargerDemandes() {
      try {
        const reponse = await fetch('/api/demandes-prof/' + utilisateur.id);
        const demandes = await reponse.json();

        const total = demandes.length;
        const attente = demandes.filter(d => d.statut === 'en attente').length;
        const confirmees = demandes.filter(d => d.statut === 'confirmée').length;

        document.getElementById('total-demandes').textContent = total;
        document.getElementById('demandes-attente').textContent = attente;
        document.getElementById('demandes-confirmees').textContent = confirmees;

        const liste = document.getElementById('liste-demandes');
        const aucune = document.getElementById('aucune-demande');

        if (total === 0) {
          aucune.style.display = 'block';
        } else {
          aucune.style.display = 'none';
          liste.innerHTML = demandes.map(d => `
            <div class="reservation-carte">
              <div class="res-header">
                <div class="res-avatar" style="background:#E1F5EE; color:#0F6E56;">${d.parent_prenom[0]}${d.parent_nom[0]}</div>
                <div>
                  <div class="res-nom">${d.parent_prenom} ${d.parent_nom}</div>
                  <div class="res-matiere">Parent</div>
                </div>
                <span class="res-statut ${d.statut === 'confirmée' ? 'vert' : 'orange'}">${d.statut}</span>
              </div>
              <div class="res-infos">
                <span>📅 ${d.date}</span>
                <span>⏰ ${d.heure}</span>
                <span>⏳ ${d.duree}h</span>
                <span>💰 ${d.duree * 2000} FDJ</span>
              </div>
              ${d.statut === 'en attente' ? `
              <div class="res-actions">
                <button class="btn-accepter" onclick="changerStatut(${d.id}, 'confirmée')">✓ Accepter</button>
                <button class="btn-refuser" onclick="changerStatut(${d.id}, 'refusée')">✕ Refuser</button>
              </div>` : ''}
            </div>
          `).join('');
        }

      } catch (erreur) {
        console.log('Erreur:', erreur);
      }
    }

    async function changerStatut(id, statut) {
      try {
        const reponse = await fetch('/api/reservation/' + id + '/statut', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ statut })
        });

        if (reponse.ok) {
          alert(statut === 'confirmée' ? 'Réservation acceptée !' : 'Réservation refusée.');
          chargerDemandes();
        }
      } catch (erreur) {
        console.log('Erreur:', erreur);
      }
    }

    chargerDemandes();

    function seDeconnecter() {
      localStorage.removeItem('token');
      localStorage.removeItem('utilisateur');
      window.location = 'index.html';
    }
  </script>

</body>
</html>
