<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon espace - Prof à la Maison</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="logo">Prof<span>àlaMaison</span></div>
    <div class="nav-liens">
      <a href="index.html">Accueil</a>
      <span id="nav-prenom" style="font-size:14px; color:#534AB7; font-weight:500;"></span>
      <a href="#" onclick="seDeconnecter()" class="btn-connexion">Déconnexion</a>
    </div>
  </nav>

  <!-- CONTENU -->
  <div class="dashboard-container">

    <!-- BIENVENUE -->
    <div class="dashboard-header">
      <div>
        <h1 id="bienvenue">Bonjour !</h1>
      </div>
      <a href="index.html" class="btn-chercher">🔍 Trouver un prof</a>
    </div>

    <!-- STATS -->
    <div class="stats-grille">
      <div class="stat-carte">
        <div class="stat-num" id="total-reservations">0</div>
        <div class="stat-label">Réservations total</div>
      </div>
      <div class="stat-carte">
        <div class="stat-num" id="reservations-attente">0</div>
        <div class="stat-label">En attente</div>
      </div>
      <div class="stat-carte">
        <div class="stat-num" id="reservations-confirmees">0</div>
        <div class="stat-label">Confirmées</div>
      </div>
    </div>

    <!-- RÉSERVATIONS -->
    <div class="dashboard-section">
      <h2>Mes réservations</h2>

      <div class="vide-container" id="aucune-reservation" style="display:none;">
        <div class="vide-icone">📚</div>
        <h3>Aucune réservation pour l'instant</h3>
        <p>Trouvez un professeur et réservez votre premier cours !</p>
        <a href="index.html" class="btn-chercher" style="display:inline-block; margin-top:16px;">Trouver un prof</a>
      </div>

      <div id="liste-reservations"></div>

    </div>

  </div>

  <script>
    const utilisateur = JSON.parse(localStorage.getItem('utilisateur'));
    const token = localStorage.getItem('token');

    if (!utilisateur || !token) {
      alert('Veuillez vous connecter.');
      window.location = 'connexion.html';
    }

    document.getElementById('bienvenue').textContent = 'Bonjour ' + utilisateur.prenom + ' !';
    document.getElementById('nav-prenom').textContent = utilisateur.prenom + ' ' + utilisateur.nom;

    // Charger les réservations
    async function chargerReservations() {
      try {
        const reponse = await fetch('/api/mes-reservations/' + utilisateur.id);
        const reservations = await reponse.json();

        const total = reservations.length;
        const attente = reservations.filter(r => r.statut === 'en attente').length;
        const confirmees = reservations.filter(r => r.statut === 'confirmée').length;

        document.getElementById('total-reservations').textContent = total;
        document.getElementById('reservations-attente').textContent = attente;
        document.getElementById('reservations-confirmees').textContent = confirmees;

        const liste = document.getElementById('liste-reservations');
        const aucune = document.getElementById('aucune-reservation');

        if (total === 0) {
          aucune.style.display = 'block';
          liste.style.display = 'none';
        } else {
          aucune.style.display = 'none';
          liste.style.display = 'block';
          liste.innerHTML = reservations.map(r => `
            <div class="reservation-carte">
              <div class="res-header">
                <div class="res-avatar">AA</div>
                <div>
                  <div class="res-nom">Amina A.</div>
                  <div class="res-matiere">Français</div>
                </div>
                <span class="res-statut ${r.statut === 'confirmée' ? 'vert' : 'orange'}">${r.statut}</span>
              </div>
              <div class="res-infos">
                <span>📅 ${r.date}</span>
                <span>⏰ ${r.heure}</span>
                <span>⏳ ${r.duree}h</span>
                <span>💰 ${r.duree * 2000} FDJ</span>
              </div>
            </div>
          `).join('');
        }

      } catch (erreur) {
        console.log('Erreur:', erreur);
      }
    }

    chargerReservations();

    function seDeconnecter() {
      localStorage.removeItem('token');
      localStorage.removeItem('utilisateur');
      window.location = 'index.html';
    }
  </script>

</body>
</html>
