<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser le mot de passe - Prof à la Maison</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="inscription.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="logo">Prof<span>àlaMaison</span></div>
    <div class="nav-liens">
      <a href="index.html">← Retour</a>
    </div>
  </nav>

  <!-- FORMULAIRE -->
  <div class="form-container">

    <div class="form-header">
      <div style="font-size:48px; margin-bottom:16px;">🔐</div>
      <h1>Nouveau mot de passe</h1>
      <p>Choisissez un nouveau mot de passe pour votre compte</p>
    </div>

    <div class="form-groupe" id="form-reset">
      <div class="form-champ">
        <label>Nouveau mot de passe</label>
        <input type="password" id="nouveau-mdp" placeholder="Minimum 8 caractères">
      </div>
      <div class="form-champ">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirmer-mdp" placeholder="Répétez le mot de passe">
      </div>
    </div>

    <button class="btn-soumettre" id="btn-reset" onclick="resetPassword()">
      Changer mon mot de passe
    </button>

    <!-- MESSAGE SUCCÈS -->
    <div id="message-succes" style="display:none; text-align:center; padding:40px 20px;">
      <div style="font-size:64px; margin-bottom:16px;">✅</div>
      <h2 style="font-size:20px; font-weight:600; margin-bottom:12px;">Mot de passe modifié !</h2>
      <p style="font-size:14px; color:#777; margin-bottom:24px;">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
      <a href="connexion.html" class="btn-soumettre" style="display:inline-block; text-decoration:none; text-align:center;">Se connecter</a>
    </div>

  </div>

  <script>
    // Récupérer le token depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      alert('Lien invalide ou expiré.');
      window.location = 'connexion.html';
    }

    async function resetPassword() {
      const nouveauMdp = document.getElementById('nouveau-mdp').value;
      const confirmerMdp = document.getElementById('confirmer-mdp').value;

      if (!nouveauMdp || !confirmerMdp) {
        alert('Veuillez remplir tous les champs.');
        return;
      }

      if (nouveauMdp.length < 8) {
        alert('Le mot de passe doit contenir au moins 8 caractères.');
        return;
      }

      if (nouveauMdp !== confirmerMdp) {
        alert('Les mots de passe ne correspondent pas.');
        return;
      }

      try {
        const reponse = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, nouveau_mot_de_passe: nouveauMdp })
        });

        const data = await reponse.json();

        if (reponse.ok) {
          document.getElementById('form-reset').style.display = 'none';
          document.getElementById('btn-reset').style.display = 'none';
          document.getElementById('message-succes').style.display = 'block';
        } else {
          alert(data.erreur || 'Lien invalide ou expiré.');
          window.location = 'connexion.html';
        }

      } catch (erreur) {
        alert('Erreur de connexion au serveur.');
      }
    }
  </script>

</body>
</html>
